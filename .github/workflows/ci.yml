name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  team-build:
    name: Team Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set Up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.10.2"

      - name: Build Service
        env:
          GITHUB_ACTOR: ${{ secrets.PACKAGES_USERNAME || github.actor }}
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: gradle test bootJar --no-daemon

      - name: Build Docker Image
        env:
          GITHUB_ACTOR: ${{ secrets.PACKAGES_USERNAME || github.actor }}
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          docker build \
            --build-arg GITHUB_ACTOR="${GITHUB_ACTOR}" \
            --build-arg GITHUB_TOKEN="${GITHUB_TOKEN}" \
            -t erdtool-team-service:test .
