name: CD Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  id-token: write

env:
  SERVICE_VALUES_KEY: team
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  build-and-promote:
    name: Build, Push, And Promote
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: production

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Validate Required Variables
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          INFRA_REPO: ${{ vars.INFRA_REPO }}
          INFRA_REPO_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
        run: |
          test -n "$AWS_REGION" || (echo "Missing vars.AWS_REGION" && exit 1)
          test -n "$AWS_ROLE_ARN" || (echo "Missing vars.AWS_ROLE_ARN" && exit 1)
          test -n "$ECR_REPOSITORY" || (echo "Missing vars.ECR_REPOSITORY" && exit 1)
          test -n "$INFRA_REPO" || (echo "Missing vars.INFRA_REPO" && exit 1)
          test -n "$INFRA_REPO_TOKEN" || (echo "Missing secrets.INFRA_REPO_TOKEN" && exit 1)

      - name: Set Up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: "8.10.2"

      - name: Build Service
        env:
          GITHUB_ACTOR: ${{ secrets.PACKAGES_USERNAME || github.actor }}
          GITHUB_TOKEN: ${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
        run: gradle test bootJar --no-daemon

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-region: ${{ vars.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: team-service-${{ github.run_id }}

      - name: Login To ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build And Push Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            GITHUB_ACTOR=${{ secrets.PACKAGES_USERNAME || github.actor }}
            GITHUB_TOKEN=${{ secrets.PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}:latest

      - name: Checkout Infra Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.INFRA_REPO }}
          ref: ${{ vars.INFRA_REPO_REF || 'main' }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra-repo

      - name: Update Infra Values
        working-directory: infra-repo
        env:
          INFRA_VALUES_FILE: ${{ vars.INFRA_VALUES_FILE || 'clusters/prod/helm/values-aws.yaml' }}
          IMAGE_REPOSITORY: ${{ steps.login-ecr.outputs.registry }}/${{ vars.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          SERVICE_VALUES_KEY: ${{ env.SERVICE_VALUES_KEY }}
        run: |
          ruby <<'RUBY'
          require "yaml"
          path = ENV.fetch("INFRA_VALUES_FILE")
          data = YAML.load_file(path) || {}
          service = data[ENV.fetch("SERVICE_VALUES_KEY")] ||= {}
          image = service["image"] ||= {}
          image["repository"] = ENV.fetch("IMAGE_REPOSITORY")
          image["tag"] = ENV.fetch("IMAGE_TAG")
          File.write(path, YAML.dump(data))
          RUBY
          grep -nE "^${SERVICE_VALUES_KEY}:|^  repository:|^  tag:" "$INFRA_VALUES_FILE"

      - name: Commit And Push Promotion
        working-directory: infra-repo
        env:
          INFRA_VALUES_FILE: ${{ vars.INFRA_VALUES_FILE || 'clusters/prod/helm/values-aws.yaml' }}
        run: |
          if git diff --quiet -- "$INFRA_VALUES_FILE"; then
            echo "No infra change detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$INFRA_VALUES_FILE"
          git commit -m "chore(prod): promote team-service@${GITHUB_SHA}"
          git push origin HEAD:${{ vars.INFRA_REPO_REF || 'main' }}
